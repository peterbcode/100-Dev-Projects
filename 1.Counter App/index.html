<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            /* full viewport height */
            display: flex;
            /* use flexbox to center app */
            justify-content: center;
            align-items: center;
            background: #0f172a;
            /* dark background */
            font-family: 'Segoe UI', sans-serif;
            /* modern font */
        }

        button {
            background-color: gray;
            border: 0px solid;
            font-size: medium;
            padding: 20px;
            margin: 5px;

        }

        .app {
            background-color: navy;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 30px;
        }

        #display {
            background-color: black;
            color: white;
            padding: 10px 100px;

        }
    </style>
</head>

<body>
    <div class="app">
        <div id="display">0</div>
        <div>
            <button id="Increment">+</button>
            <button id="Decrement">-</button>
            <button id="Reset">Reset</button>
        </div>
    </div>

    <script>
        let count = 0;
        let display = document.getElementById("display")

        function changeDisplay() {
            display.textContent = count;
        }

        function changeCount(action) {
            switch (action) {
                case 'Increment':
                    count++;
                    break;
                case 'Decrement':
                    count--;
                    break;
                case 'Reset':
                    count = 0;
                    break;
            }
            changeDisplay();
        }
        document.querySelectorAll("button").forEach(btn => {
            btn.addEventListener("click", () => changeCount(btn.id));
        });
    </script>
</body>

</html>
